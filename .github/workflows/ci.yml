name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint -- --max-warnings=454

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Dependency audit (non-blocking)
        continue-on-error: true
        run: bun pm audit || npm audit --audit-level=high || true